# Workflow syntax: https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax
# .NET RID: https://learn.microsoft.com/en-us/dotnet/core/rid-catalog
# Version from msbuild: https://learn.microsoft.com/en-us/visualstudio/msbuild/msbuild-command-line-reference?view=visualstudio
# Output parameters: https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-commands#setting-an-output-parameter
# Checkout action: https://github.com/marketplace/actions/checkout?version=v6.0.2
# Setup .NET action: https://github.com/marketplace/actions/setup-net-core-sdk?version=v5.2.0
# Download artifact action: https://github.com/marketplace/actions/download-a-build-artifact?version=v8.0.1
# GitHub Release action: https://github.com/marketplace/actions/gh-release?version=v2.6.1