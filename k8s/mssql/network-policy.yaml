apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mssql-network-policy
  namespace: deployment-manager
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mssql
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: api
    ports:
    - protocol: TCP
      port: 1433
  egress:
  # Allow DNS to CoreDNS in kube-system
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53

# Sources:
# Network policies documentation: https://kubernetes.io/docs/concepts/services-networking/network-policies/
# Inspired by previous personal network policies:
# https://github.com/Team-2-Devs/infra-core/blob/main/k8s/